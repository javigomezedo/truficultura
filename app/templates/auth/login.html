<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Truficultura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 420px; }
    </style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card w-100 px-3">
        <div class="text-center mb-4">
            <span style="font-size: 3rem;">&#127811;</span>
            <h1 class="h3 fw-bold mt-2">Truficultura</h1>
            <p class="text-muted">Gestión de explotación trufícola</p>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title mb-4">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                </h5>

                {% if request.query_params.get("registered") %}
                <div class="alert alert-success small">
                    <i class="bi bi-check-circle-fill me-1"></i>
                    Cuenta creada correctamente. Ya puedes iniciar sesión.
                </div>
                {% endif %}

                {% if error %}
                <div class="alert alert-danger small">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post" action="/login">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Usuario</label>
                        <input type="text" class="form-control" id="username" name="username"
                               autocomplete="username" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                               autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-center text-muted small mb-0">
                    ¿No tienes cuenta?
                    <a href="/register" class="text-decoration-none fw-semibold">Crear una nueva</a>
                </p>
    </div>
</div>
</body>
</html>
