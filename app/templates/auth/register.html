<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — Truficultura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .register-card { max-width: 420px; }
    </style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="register-card w-100 px-3">
        <div class="text-center mb-4">
            <span style="font-size: 3rem;">&#127811;</span>
            <h1 class="h3 fw-bold mt-2">Truficultura</h1>
            <p class="text-muted">Crear nueva cuenta</p>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title mb-1">
                    <i class="bi bi-person-plus-fill me-2"></i>Crear cuenta de usuario
                </h5>
                <p class="text-muted small mb-4">
                    Cada usuario tiene sus propios datos de parcelas, gastos e ingresos.
                </p>

                {% if error %}
                <div class="alert alert-danger small">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post" action="/register">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                        <input type="text" class="form-control" id="username" name="username"
                               autocomplete="username" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                               autocomplete="new-password" required
                               minlength="8">
                        <div class="form-text">Mínimo 8 caracteres.</div>
                    </div>
                    <div class="mb-4">
                        <label for="password_confirm" class="form-label fw-semibold">Confirmar contraseña</label>
                        <input type="password" class="form-control" id="password_confirm"
                               name="password_confirm" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">
                        <i class="bi bi-person-check-fill me-1"></i>Crear cuenta
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-center text-muted small mb-0">
                    ¿Ya tienes cuenta?
                    <a href="/login" class="text-decoration-none fw-semibold">Inicia sesión</a>
                </p>
    </div>
</div>
</body>
</html>
