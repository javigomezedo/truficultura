{% extends "base.html" %}

{% block title %}{{ _("Registrar peso de trufa") }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card tf-panel border-0 shadow-sm">
        <div class="card-body">
            <h1 class="h3 mb-3">
                <i class="bi bi-upc-scan text-success me-2"></i>{{ _("Registro por QR") }}
            </h1>
            <p class="mb-1">{{ _("Planta") }}: <strong>{{ plant.label }}</strong></p>
            <p class="mb-3">{{ _("Parcela") }}: <strong>{{ plant.plot_id }}</strong></p>

            <form method="post" class="row g-3 align-items-end">
                <div class="col-sm-4">
                    <label for="estimated_weight_grams" class="form-label">{{ _("Peso orientativo (g)") }}</label>
                    <input id="estimated_weight_grams"
                           name="estimated_weight_grams"
                           type="number"
                              min="0"
                           max="5000"
                           step="0.1"
                              value="0"
                           class="form-control"
                           required>
                    <div class="d-flex flex-wrap gap-1 mt-2">
                        <button type="button" class="btn btn-outline-success btn-sm js-qr-weight-add" data-add="10">+10</button>
                        <button type="button" class="btn btn-outline-success btn-sm js-qr-weight-add" data-add="50">+50</button>
                        <button type="button" class="btn btn-outline-success btn-sm js-qr-weight-add" data-add="100">+100</button>
                        <button type="button" class="btn btn-outline-success btn-sm js-qr-weight-add" data-add="500">+500</button>
                    </div>
                </div>
                <div class="col-sm-8 d-flex gap-2">
                    <button class="btn btn-success" type="submit">
                        <i class="bi bi-check-circle me-1"></i>{{ _("Registrar") }}
                    </button>
                    <a href="/plots/{{ plant.plot_id }}/map" class="btn btn-outline-secondary">{{ _("Cancelar") }}</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const qrWeightInput = document.getElementById('estimated_weight_grams');
    document.querySelectorAll('.js-qr-weight-add').forEach((btn) => {
        btn.addEventListener('click', () => {
            const add = Number(btn.dataset.add || 0);
            const current = Number(qrWeightInput.value || 0);
            const next = Math.min(5000, Math.max(0, current + add));
            qrWeightInput.value = next.toFixed(1);
            qrWeightInput.focus();
        });
    });
</script>
{% endblock %}
