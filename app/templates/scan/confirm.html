{% extends "base.html" %}

{% block title %}{{ _("Registrar peso de trufa") }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">
        <div class="card tf-panel border-0 shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-3">
                    <i class="bi bi-upc-scan text-success me-2"></i>{{ _("Registro por QR") }}
                </h1>
                <p class="mb-1">{{ _("Planta") }}: <strong>{{ plant.label }}</strong></p>
                <p class="mb-3">{{ _("Parcela") }}: <strong>{{ plant.plot_id }}</strong></p>

                <form method="post">
                    <div class="mb-3">
                        <label for="estimated_weight_grams" class="form-label fw-semibold">{{ _("Peso orientativo (g)") }}</label>
                        <input id="estimated_weight_grams"
                               name="estimated_weight_grams"
                               type="number"
                               min="0"
                               max="5000"
                               step="0.1"
                               value="0"
                               class="form-control form-control-lg"
                               inputmode="decimal"
                               enterkeyhint="done"
                               required>
                        <div class="d-flex flex-wrap gap-2 mt-2">
                            <button type="button" class="btn btn-outline-success flex-fill js-qr-weight-add" data-add="10">+10</button>
                            <button type="button" class="btn btn-outline-success flex-fill js-qr-weight-add" data-add="50">+50</button>
                            <button type="button" class="btn btn-outline-success flex-fill js-qr-weight-add" data-add="100">+100</button>
                            <button type="button" class="btn btn-outline-success flex-fill js-qr-weight-add" data-add="500">+500</button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="quality" class="form-label fw-semibold">{{ _("Calidad") }}</label>
                        <select class="form-select" id="quality" name="quality">
                            <option value="">{{ _("— Sin calidad —") }}</option>
                            <option value="extra">{{ _("Extra") }}</option>
                            <option value="primera">{{ _("Primera") }}</option>
                            <option value="segunda">{{ _("Segunda") }}</option>
                            <option value="blanda">{{ _("Blanda") }}</option>
                            <option value="agusanada">{{ _("Agusanada") }}</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-success flex-grow-1" type="submit">
                            <i class="bi bi-check-circle me-1"></i>{{ _("Registrar") }}
                        </button>
                        <a href="/plots/{{ plant.plot_id }}/map" class="btn btn-outline-secondary">{{ _("Cancelar") }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const qrWeightInput = document.getElementById('estimated_weight_grams');
    document.querySelectorAll('.js-qr-weight-add').forEach((btn) => {
        btn.addEventListener('click', () => {
            const add = Number(btn.dataset.add || 0);
            const current = Number(qrWeightInput.value || 0);
            const next = Math.min(5000, Math.max(0, current + add));
            qrWeightInput.value = next.toFixed(1);
            qrWeightInput.focus();
        });
    });
</script>
{% endblock %}
