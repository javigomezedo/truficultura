name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trufi
          POSTGRES_PASSWORD: trufi
          POSTGRES_DB: trufiq
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U trufi -d trufiq"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov httpx aiosqlite

      - name: Validate migrations bootstrap from empty DB
        env:
          DATABASE_URL: postgres://trufi:trufi@localhost:5433/trufiq
        run: |
          alembic upgrade head

      - name: Run tests
        run: pytest -q tests/

      - name: Build Docker image
        run: docker build -t trufiq:ci .
