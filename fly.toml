# fly.toml app configuration file generated for trufiq-dev on 2026-04-03T09:08:10+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trufiq-dev'
primary_region = 'cdg'

[build]

[deploy]
  # Run migrations once before new machines start (on a temporary release VM).
  # This avoids delaying uvicorn startup on every machine restart.
  release_command = "alembic upgrade head"
  # Start new machines and wait for them to be healthy BEFORE stopping old ones.
  # Eliminates the 3-second startup gap from ever affecting live traffic.
  strategy = "bluegreen"

[processes]
  app = "/entrypoint.sh"

[env]
  # Migrations are handled by the release_command above; skip them in the app machines.
  RUN_MIGRATIONS = "0"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
  processes = ["app"]


# ---------------------------------------------------------------------------
# Cron: importación diaria de lluvia + gastos recurrentes + avisos
# Máquina gestionada MANUALMENTE (fly deploy no la toca — las scheduled machines
# no son compatibles con el ciclo de deploy de procesos regulares en fly.io).
#
# Machine: 2876015b966378 (trufiq-dev-cron, 256 MB, región cdg)
#   schedule: NINGUNO — arrancada diariamente a las 04:00 UTC por GitHub Actions
#             (.github/workflows/cron-daily.yml → fly machine start 2876015b966378)
#             04:00 UTC = 06:00 CEST (verano) / 05:00 CET (invierno)
#   cmd: sh -c 'python scripts/import_rainfall_cron.py; python scripts/process_recurring_expenses_cron.py; python scripts/process_notifications_cron.py'
#   NOTA: usa ; (no &&) para que cada script siempre se ejecute aunque el anterior falle.
#
# La imagen se actualiza automáticamente tras cada push a main mediante
# el step "Update cron machine image" en .github/workflows/fly-deploy.yml.
#
# Para verificar: fly machine list --app trufiq-dev
# Para logs:      fly logs --app trufiq-dev --instance 2876015b966378
# Para lanzar manualmente:
#   fly machine start 2876015b966378 --app trufiq-dev
# Para actualizar el comando (requiere token personal, no deploy token):
