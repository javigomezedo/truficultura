{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h2 class="mb-4">
                <i class="bi bi-pencil-fill me-2"></i>Editar Usuario
            </h2>

            <div class="card">
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
                    </div>
                    {% endif %}

                    <form method="post" action="/admin/users/{{ user.id }}">
                        <div class="mb-3">
                            <label for="first_name" class="form-label fw-semibold">Nombre</label>
                            <input type="text" class="form-control" id="first_name" name="first_name"
                                   value="{{ user.first_name }}" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="last_name" class="form-label fw-semibold">Apellidos</label>
                            <input type="text" class="form-control" id="last_name" name="last_name"
                                   value="{{ user.last_name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ user.email }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Nombre de usuario</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   value="{{ user.username }}" required>
                        </div>

                        <div class="mb-4">
                            <label for="role" class="form-label fw-semibold">Rol</label>
                            <select class="form-select" id="role" name="role">
                                <option value="user" {% if user.role == "user" %}selected{% endif %}>Usuario</option>
                                <option value="admin" {% if user.role == "admin" %}selected{% endif %}>Administrador</option>
                            </select>
                        </div>

                        <div class="alert alert-info" role="alert">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            <strong>Estado:</strong>
                            {% if user.is_active %}
                            <span class="badge bg-success">Activo</span>
                            {% else %}
                            <span class="badge bg-warning">Desactivado</span>
                            {% endif %}
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="bi bi-check-circle me-1"></i>Guardar Cambios
                            </button>
                            <a href="/admin/users" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
