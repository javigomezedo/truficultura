# fly.toml app configuration file generated for truficultura-dev on 2026-04-03T09:08:10+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'truficultura-dev'
primary_region = 'cdg'

[build]

[processes]
  app = "/entrypoint.sh"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

[metrics]
  port = 8000
  path = "/metrics"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
  processes = ["app"]


# ---------------------------------------------------------------------------
# Cron: importación diaria de lluvia + gastos recurrentes
# Máquina gestionada MANUALMENTE (fly deploy no la toca — las scheduled machines
# no son compatibles con el ciclo de deploy de procesos regulares en fly.io).
#
# Machine: d894945a7d55e8 (lingering-darkness-4100, 256 MB, región cdg)
#   schedule: daily | env: RUN_MIGRATIONS=0
#   cmd: sh -c 'python scripts/import_rainfall_cron.py; python scripts/process_recurring_expenses_cron.py'
#   NOTA: usa ; (no &&) para que el segundo script siempre se ejecute aunque el primero falle.
#
# La imagen se actualiza automáticamente tras cada push a main mediante
# el step "Update cron machine image" en .github/workflows/fly-deploy.yml.
#
# Para verificar: fly machine list --app truficultura-dev
# Para logs:      fly logs --app truficultura-dev --instance d894945a7d55e8
# Para actualizar el comando:
#   fly machine update d894945a7d55e8 --app truficultura-dev \
#     --command "sh -c 'python scripts/import_rainfall_cron.py; python scripts/process_recurring_expenses_cron.py'"
