# fly.toml app configuration file generated for truficultura-dev on 2026-04-03T09:08:10+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'truficultura-dev'
primary_region = 'cdg'

[build]

[processes]
  app = "/entrypoint.sh"
  cron = "sh -c 'python scripts/import_rainfall_cron.py && python scripts/process_recurring_expenses_cron.py'"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
  processes = ["app"]

[[vm]]
  memory = '256mb'
  cpus = 1
  processes = ["cron"]

# ---------------------------------------------------------------------------
# Cron: importación diaria de lluvia + gastos recurrentes
# Gestionada por fly deploy mediante el proceso "cron" definido arriba.
# Machine: d894945a7d55e8 (lingering-darkness-4100, 256 MB, región cdg)
#   process_group: cron  ← asociada con: fly machine update d894945a7d55e8 --metadata fly_process_group=cron
#   schedule: daily      ← configurado en la máquina (persiste entre deploys)
#   env: RUN_MIGRATIONS=0
# Para verificar: fly machine list --app truficultura-dev
# Para logs:      fly logs --app truficultura-dev
# ---------------------------------------------------------------------------

