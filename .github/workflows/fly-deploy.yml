# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
jobs:
  deploy:
    name: Deploy app
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Update cron machine image
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          IMAGE=$(flyctl machine list --app truficultura-dev --json | python3 -c "
          import json, sys
          machines = json.load(sys.stdin)
          app_machines = [m for m in machines if m['config'].get('metadata', {}).get('fly_process_group') == 'app']
          print(app_machines[0]['config']['image'])
          ")
          echo "Updating cron machine with image: $IMAGE"
          flyctl machine update d894945a7d55e8 --app truficultura-dev --image "$IMAGE" --yes
      - name: Healthcheck post-deploy
        run: |
          curl --fail --silent --show-error https://truficultura-dev.fly.dev/health
